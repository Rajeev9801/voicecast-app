services:
  - type: web
    name: voicecast-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Requires manual entry in Render Dashboard to MongoDB Atlas URI
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false # Set to Vercel URL
